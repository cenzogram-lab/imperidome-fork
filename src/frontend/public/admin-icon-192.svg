<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bgGrad192" cx="50%" cy="100%" r="80%">
      <stop offset="0%" stop-color="#0f1a0f"/>
      <stop offset="100%" stop-color="#0d0d0d"/>
    </radialGradient>

    <!-- Dome fill gradient -->
    <radialGradient id="domeGrad192" cx="50%" cy="100%" r="100%">
      <stop offset="0%" stop-color="#1a4d1a"/>
      <stop offset="55%" stop-color="#22a022"/>
      <stop offset="100%" stop-color="#39ff14"/>
    </radialGradient>

    <!-- Subtle dome glow -->
    <filter id="domeGlow192" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Letter glow -->
    <filter id="letterGlow192" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Ground glow -->
    <radialGradient id="groundGlow192" cx="50%" cy="0%" r="50%">
      <stop offset="0%" stop-color="#39ff14" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#39ff14" stop-opacity="0"/>
    </radialGradient>

    <!-- Dome stroke gradient -->
    <linearGradient id="domeStroke192" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#1a4d1a"/>
      <stop offset="100%" stop-color="#39ff14"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="192" height="192" fill="url(#bgGrad192)" rx="24"/>

  <!-- Ground glow ellipse -->
  <ellipse cx="96" cy="172" rx="68" ry="10" fill="url(#groundGlow192)"/>

  <!-- Dome filled hemisphere -->
  <path d="M 30 172 A 66 66 0 0 1 162 172 Z" fill="url(#domeGrad192)" filter="url(#domeGlow192)" opacity="0.95"/>

  <!-- Dome arc edge highlight -->
  <path d="M 30 172 A 66 66 0 0 1 162 172" fill="none" stroke="url(#domeStroke192)" stroke-width="1.5" opacity="0.9"/>

  <!-- Bold I letter -->
  <g filter="url(#letterGlow192)">
    <!-- Top bar -->
    <rect x="74" y="42" width="44" height="8" rx="2" fill="#e8ffe8"/>
    <!-- Vertical stem -->
    <rect x="88" y="50" width="16" height="58" rx="2" fill="#ffffff"/>
    <!-- Bottom bar -->
    <rect x="74" y="108" width="44" height="8" rx="2" fill="#e8ffe8"/>
  </g>

  <!-- Top apex glow dot -->
  <circle cx="96" cy="106" r="4" fill="#39ff14" opacity="0.85"/>
</svg>
